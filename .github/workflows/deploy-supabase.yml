name: Deploy Supabase Edge Functions

# Auto-deploys all Supabase Edge Functions to production whenever function
# code (or this workflow) changes on main. The frontend is deployed separately
# and automatically by Vercel on the same push. Together these give the repo a
# fully automatic GitHub -> Vercel (frontend) + GitHub -> Supabase (backend)
# pipeline with no manual CLI steps.
#
# One-time setup: add a repository secret named SUPABASE_ACCESS_TOKEN
#   (Supabase Dashboard -> Account -> Access Tokens -> Generate new token),
#   then either push to main or run this workflow manually from the Actions tab.

on:
  push:
    branches: [main]
    paths:
      - "supabase/functions/**"
      - "supabase/config.toml"
      - ".github/workflows/deploy-supabase.yml"
  workflow_dispatch: {}

concurrency:
  group: supabase-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_REF: jiiparpfkjytdcuelcns
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify access token is configured
        run: |
          if [ -z "${SUPABASE_ACCESS_TOKEN}" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN secret is not set. Add it under repo Settings -> Secrets and variables -> Actions, then re-run."
            exit 1
          fi

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy all Edge Functions
        run: supabase functions deploy --project-ref "$PROJECT_REF"
