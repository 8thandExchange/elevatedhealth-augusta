name: Deploy Supabase Edge Functions

# Auto-deploys all Supabase Edge Functions to production whenever function
# code (or this workflow) changes on main. The frontend is deployed separately
# and automatically by Vercel on the same push. Together these give the repo a
# fully automatic GitHub -> Vercel (frontend) + GitHub -> Supabase (backend)
# pipeline with no manual CLI steps.
#
# One-time setup: add a repository secret named SUPABASE_ACCESS_TOKEN
#   (Supabase Dashboard -> Account -> Access Tokens -> Generate new token),
#   then either push to main or run this workflow manually from the Actions tab.

on:
  push:
    branches: [main]
    paths:
      - "supabase/functions/**"
      - "supabase/config.toml"
      - ".github/workflows/deploy-supabase.yml"
  workflow_dispatch: {}

concurrency:
  group: supabase-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_REF: jiiparpfkjytdcuelcns
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify access token is configured
        run: |
          if [ -z "${SUPABASE_ACCESS_TOKEN}" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN secret is not set. Add it under repo Settings -> Secrets and variables -> Actions, then re-run."
            exit 1
          fi

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      # `supabase functions deploy` bundles every function, each fetching its
      # remote imports (esm.sh / deno.land) at build time. A single transient
      # CDN error (e.g. Cloudflare 522) aborts the whole batch, so we retry.
      # Re-deploying already-deployed functions is idempotent and safe.
      - name: Deploy all Edge Functions (retry transient CDN errors)
        run: |
          set +e
          attempt=1
          max=4
          until [ "$attempt" -gt "$max" ]; do
            echo "::group::Deploy attempt $attempt/$max"
            supabase functions deploy --project-ref "$PROJECT_REF"
            code=$?
            echo "::endgroup::"
            if [ "$code" -eq 0 ]; then
              echo "Deploy succeeded on attempt $attempt."
              exit 0
            fi
            echo "Attempt $attempt failed (exit $code) — likely a transient import/CDN error. Retrying in 20s..."
            attempt=$((attempt + 1))
            sleep 20
          done
          echo "::error::Edge Function deploy failed after $max attempts."
          exit 1
