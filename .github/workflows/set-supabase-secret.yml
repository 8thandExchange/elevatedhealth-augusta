name: Set Supabase Secret (manual)

on:
  workflow_dispatch:
    inputs:
      secret_name:
        description: "Secret name (e.g. STAFF_NOTIFICATION_PHONE)"
        required: true
        type: string
      secret_value:
        description: "Secret value"
        required: true
        type: string

concurrency:
  group: supabase-secret
  cancel-in-progress: false

jobs:
  set:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_REF: jiiparpfkjytdcuelcns
    steps:
      - name: Verify access token
        run: test -n "${SUPABASE_ACCESS_TOKEN}"

      - name: Set secret via Management API
        run: |
          set -euo pipefail
          PAYLOAD=$(jq -n \
            --arg name "${{ github.event.inputs.secret_name }}" \
            --arg value "${{ github.event.inputs.secret_value }}" \
            '[{name: $name, value: $value}]')
          RESP=$(printf '%s' "$PAYLOAD" | curl -sS -w $'\n%{http_code}' \
            -X POST "https://api.supabase.com/v1/projects/${PROJECT_REF}/secrets" \
            -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            --data @-)
          CODE=$(printf '%s' "$RESP" | tail -n1)
          BODY=$(printf '%s' "$RESP" | sed '$d')
          echo "HTTP ${CODE}"
          echo "$BODY"
          if [ "${CODE}" -ge 300 ]; then
            echo "::error::Failed to set secret"
            exit 1
          fi
          echo "Secret updated."
